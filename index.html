<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0f17" />
  <title>Ahmed's Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
    <span class="grid"></span>
  </div>

  <main class="page">
    <section class="profile-card">
      <div class="avatar-wrap">
        <img src="images/picsart.jpg" alt="صورة الملف الشخصي" class="avatar" />
        <span class="status-dot" title="متاح"></span>
      </div>

      
      <h1 class="name">Ahmed Mahmoud</h1>

      
      <p class="location">Minya, Maghagha</p>

      <p class="bio">
        'Front-end developer and web designer'
      </p>
      <div class="actions">
        <button class="social-btn" type="button" data-link="https://instagram.com/ahmed.plxy">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.8"/>
              <circle cx="17.2" cy="6.8" r="1.2" fill="currentColor"/>
            </svg>
          </span>
          <span>Instagram</span>
        </button>
        <button class="social-btn" type="button" data-link="https://facebook.com/profile.php?id=61585721714535">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M14.5 8.5h2.3V5.7h-2.3c-2.3 0-3.8 1.5-3.8 3.9v2.1H8v2.8h2.7V19h3v-5.5h2.8l.5-2.8h-3.3V9.9c0-.8.5-1.4 1.3-1.4Z" fill="currentColor"/>
            </svg>
          </span>
          <span>Facebook</span>
        </button>
        <button class="social-btn" type="button" data-link="https://wa.me/201006039597">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 3.5A8.5 8.5 0 0 0 4.2 15.3L3.5 20l4.8-.6A8.5 8.5 0 1 0 12 3.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M9.4 8.8c.2-.4.4-.4.7-.4h.6c.2 0 .5.1.6.4l.7 1.8c.1.2.1.4 0 .6l-.5.6c-.1.1-.2.3-.1.5.3.6.9 1.4 1.6 2 .2.2.4.2.6.1l.8-.4c.2-.1.5-.1.7 0l1.7.8c.3.1.4.4.3.7-.3.9-1 1.4-1.7 1.4-2.9 0-6.6-3.7-6.6-6.6 0-.7.5-1.4 1.4-1.7Z" fill="currentColor"/>
            </svg>
          </span>
          <span>Whatsapp</span>
        </button>
      </div>

      <div class="footer-note">
        "There's always something you can do."
      </div>
    </section>
  </main>

  <div class="toast" id="toast" aria-live="polite" aria-atomic="true"></div>
  <script src="script.js"></script>
</body>
</html>
